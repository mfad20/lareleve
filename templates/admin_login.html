<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — La Relève</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo-title { font-size: 1.4rem; font-weight: 700; color: #D4AF37; letter-spacing: 0.05em; }
    .logo-sub { font-size: 0.8rem; color: #64748b; margin-top: 0.2rem; }
    h2 { font-size: 1rem; font-weight: 600; color: #94a3b8; text-align: center; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.82rem; color: #94a3b8; margin-bottom: 0.4rem; }
    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f8fafc;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #D4AF37; }
    button {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.8rem;
      background: #D4AF37;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #e6c54e; }
    .alert {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.65rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-title">LA RELÈVE</div>
      <div class="logo-sub">Administration — DISE ENSEA 2026</div>
    </div>
    <h2>Accès restreint</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autofocus required>
      <button type="submit">Connexion</button>
    </form>
  </div>
</body>
</html>
